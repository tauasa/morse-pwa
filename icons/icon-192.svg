<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#1a1400"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.88" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="192" height="192" rx="34.56" fill="url(#bg)"/>
  <!-- Outer amber ring -->
  <rect x="11.52" y="11.52" width="168.96" height="168.96"
        rx="26.880000000000003" fill="none" stroke="#e8a020" stroke-width="3.4559999999999995" opacity="0.3"/>
  <!-- Morse: · − − (W) centered -->
  <g filter="url(#glow)" fill="#e8a020">
    <!-- dot -->
    <circle cx="53.760000000000005" cy="96.0" r="11.136000000000001"/>
    <!-- dash 1 -->
    <rect x="72.96000000000001" y="87.168" width="26.880000000000003" height="17.664" rx="5.76"/>
    <!-- dash 2 -->
    <rect x="107.52000000000001" y="87.168" width="26.880000000000003" height="17.664" rx="5.76"/>
  </g>
  <!-- MORSE label -->
  <text x="96.0" y="140.16" text-anchor="middle"
        font-family="serif" font-size="20.16" letter-spacing="4.800000000000001"
        fill="#e8a020" opacity="0.8">MORSE</text>
</svg>