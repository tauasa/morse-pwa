<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#1a1400"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="7.68" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="92.16" fill="url(#bg)"/>
  <!-- Outer amber ring -->
  <rect x="30.72" y="30.72" width="450.56" height="450.56"
        rx="71.68" fill="none" stroke="#e8a020" stroke-width="9.216" opacity="0.3"/>
  <!-- Morse: · − − (W) centered -->
  <g filter="url(#glow)" fill="#e8a020">
    <!-- dot -->
    <circle cx="143.36" cy="256.0" r="29.696"/>
    <!-- dash 1 -->
    <rect x="194.56" y="232.448" width="71.68" height="47.104" rx="15.36"/>
    <!-- dash 2 -->
    <rect x="286.72" y="232.448" width="71.68" height="47.104" rx="15.36"/>
  </g>
  <!-- MORSE label -->
  <text x="256.0" y="373.76" text-anchor="middle"
        font-family="serif" font-size="53.76" letter-spacing="12.8"
        fill="#e8a020" opacity="0.8">MORSE</text>
</svg>