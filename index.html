<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="description" content="Morse Code Converter — encode, decode, and play Morse code" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Morse" />

  <title>Morse — Code Converter</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- Google Fonts: Telegraf-style display + monospace -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Share+Tech+Mono&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

  <!-- Atmospheric background noise -->
  <canvas id="noise-canvas" aria-hidden="true"></canvas>

  <div class="app-shell">

    <!-- ── Header ─────────────────────────────────────────────────────── -->
    <header class="app-header">
      <div class="header-inner">
        <div class="brand">
          <span class="brand-dot">·−−</span>
          <h1 class="brand-name">MORSE-PWA</h1>
          <span class="brand-version">v1.0.0</span>
        </div>
        <nav class="header-nav">
          <button class="nav-btn" id="settings-btn" aria-label="Open settings" title="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
          <button class="nav-btn" id="about-btn" aria-label="About" title="About">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </button>
        </nav>
      </div>
      <!-- Morse decorative ticker -->
      <div class="header-ticker" aria-hidden="true">
        <span class="ticker-text">· · · &nbsp;− − − &nbsp;· · · &nbsp;&nbsp;&nbsp; − · · − · · &nbsp;· &nbsp;− · &nbsp;− · · &nbsp;· &nbsp;− · · − · · &nbsp;· &nbsp;− · &nbsp;− · ·</span>
      </div>
    </header>

    <!-- ── Main converter panels ───────────────────────────────────────── -->
    <main class="converter">

      <!-- TEXT panel -->
      <section class="panel panel--text" aria-label="Plain text panel">
        <div class="panel-header">
          <label class="panel-label" for="text-area">Text</label>
          <div class="panel-controls">
            <label class="sound-toggle" title="Play sound">
              <input type="checkbox" id="text-play-check" />
              <span class="toggle-track">
                <span class="toggle-icon">♪</span>
              </span>
              <span class="toggle-label">Sound</span>
            </label>
          </div>
        </div>

        <div class="textarea-wrap">
          <textarea
            id="text-area"
            class="panel-textarea"
            placeholder="Type or paste plain text here…"
            spellcheck="false"
            rows="6"
          ></textarea>
        </div>

        <div class="panel-footer">
          <button class="btn btn--primary encode-btn" id="encode-btn">
            <span class="btn-label">Encode</span>
            <span class="btn-arrow">→</span>
          </button>
          <button class="btn btn--ghost clear-btn" id="clear-text-btn" aria-label="Clear text">
            Clear
          </button>
        </div>
      </section>

      <!-- MORSE panel -->
      <section class="panel panel--morse" aria-label="Morse code panel">
        <div class="panel-header">
          <label class="panel-label" for="morse-area">Morse</label>
          <div class="panel-controls">
            <label class="sound-toggle" title="Play sound">
              <input type="checkbox" id="morse-play-check" />
              <span class="toggle-track">
                <span class="toggle-icon">♪</span>
              </span>
              <span class="toggle-label">Sound</span>
            </label>
          </div>
        </div>

        <div class="textarea-wrap">
          <!-- Visible textarea for editing -->
          <textarea
            id="morse-area"
            class="panel-textarea panel-textarea--morse"
            placeholder="Type or paste Morse code here  (e.g.  ... --- ...)"
            spellcheck="false"
            rows="6"
          ></textarea>
          <!-- Overlay for character highlighting during playback -->
          <div id="morse-highlight-overlay" class="morse-highlight-overlay" aria-hidden="true"></div>
        </div>

        <div class="panel-footer">
          <button class="btn btn--primary decode-btn" id="decode-btn">
            <span class="btn-arrow">←</span>
            <span class="btn-label">Decode</span>
          </button>
          <button class="btn btn--ghost clear-btn" id="clear-morse-btn" aria-label="Clear Morse">
            Clear
          </button>
        </div>
      </section>

    </main>

    <!-- ── Status bar ──────────────────────────────────────────────────── -->
    <div class="status-bar" id="status-bar" role="status" aria-live="polite">
      Ready
    </div>

  </div><!-- /.app-shell -->

  <!-- ── Settings Dialog ────────────────────────────────────────────────── -->
  <div class="dialog-backdrop" id="settings-backdrop" hidden>
    <dialog class="dialog settings-dialog" id="settings-dialog" aria-label="Audio Settings">
      <button class="dialog-close" id="settings-close" aria-label="Close settings">✕</button>
      <h2 class="dialog-title">Audio Settings</h2>

      <div class="settings-grid">

        <div class="setting-row">
          <label class="setting-label" for="sample-rate-input">Sample Rate</label>
          <div class="setting-controls">
            <input type="range" id="sample-rate-slider" class="setting-slider"
              min="8000" max="48000" step="1000" value="44100" />
            <input type="number" id="sample-rate-input" class="setting-number"
              min="8000" max="48000" step="1000" value="44100" />
            <span class="setting-unit">Hz</span>
          </div>
        </div>

        <div class="setting-row">
          <label class="setting-label" for="frequency-input">Frequency</label>
          <div class="setting-controls">
            <input type="range" id="frequency-slider" class="setting-slider"
              min="200" max="2000" step="10" value="700" />
            <input type="number" id="frequency-input" class="setting-number"
              min="200" max="2000" step="10" value="700" />
            <span class="setting-unit">Hz</span>
          </div>
        </div>

        <div class="setting-row">
          <label class="setting-label" for="amplitude-input">Amplitude</label>
          <div class="setting-controls">
            <input type="range" id="amplitude-slider" class="setting-slider"
              min="0.05" max="1.0" step="0.05" value="0.5" />
            <input type="number" id="amplitude-input" class="setting-number"
              min="0.05" max="1.0" step="0.05" value="0.5" />
            <span class="setting-unit"></span>
          </div>
        </div>

        <div class="setting-row">
          <label class="setting-label" for="dot-ms-input">Dot Duration</label>
          <div class="setting-controls">
            <input type="range" id="dot-ms-slider" class="setting-slider"
              min="20" max="300" step="5" value="60" />
            <input type="number" id="dot-ms-input" class="setting-number"
              min="20" max="300" step="5" value="60" />
            <span class="setting-unit">ms</span>
          </div>
        </div>

      </div>

      <p class="settings-note">Dash = 3× dot &nbsp;·&nbsp; Letter gap = 3× dot &nbsp;·&nbsp; Word gap = 7× dot</p>

      <div class="dialog-footer">
        <button class="btn btn--ghost" id="settings-reset">Reset Defaults</button>
        <div class="dialog-footer-right">
          <button class="btn btn--ghost" id="settings-cancel">Cancel</button>
          <button class="btn btn--primary" id="settings-apply">Apply</button>
        </div>
      </div>
    </dialog>
  </div>

  <!-- ── About Dialog ────────────────────────────────────────────────────── -->
  <div class="dialog-backdrop" id="about-backdrop" hidden>
    <dialog class="dialog about-dialog" id="about-dialog" aria-label="About Morse">
      <button class="dialog-close" id="about-close" aria-label="Close about">✕</button>
      <div class="about-content">
        <div class="about-logo">·−−</div>
        <h2 class="about-title">Morse-PWA 1.0.0</h2>
        <p class="about-tagline">Tauasa Timoteo</p>
        <a class="about-link" href="https://github.com/tauasa/morse-pwa" target="_blank" rel="noopener">
          github.com/tauasa/morse-pwa
        </a>
      </div>
      <div class="dialog-footer" style="justify-content:center">
        <button class="btn btn--primary" id="about-ok">OK</button>
      </div>
    </dialog>
  </div>

  <script src="/app.js" type="module"></script>
</body>
</html>
